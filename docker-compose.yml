services:
  mysql:
    image: mysql:8.0
    container_name: httpserver-mysql
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-root}
      MYSQL_DATABASE: ${DB_NAME:-webapp}
    # 不映射到宿主机，避免与本机 MySQL(3306) 冲突；应用通过 Docker 内网 mysql:3306 访问
    volumes:
      - mysql_data:/var/lib/mysql
      # 仅当 mysql_data 为空时执行；文件名前缀 01- 保证执行顺序
      - ./init.sql:/docker-entrypoint-initdb.d/01-schema.sql:ro
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
    healthcheck:
      test:
        [
          "CMD-SHELL",
          'mysqladmin ping -h localhost -uroot -p"$$MYSQL_ROOT_PASSWORD" || exit 1',
        ]
      interval: 5s
      timeout: 5s
      retries: 12
      start_period: 30s
    restart: unless-stopped

  app:
    build: .
    image: lly666666/httpserver:v1.0
    container_name: httpserver-app
    ports:
      - "${APP_PORT:-8080}:8080"
    environment:
      DB_HOST: ${DB_HOST:-tcp://mysql:3306}
      DB_USER: ${DB_USER:-root}
      DB_PASSWORD: ${MYSQL_ROOT_PASSWORD:-root}
      DB_NAME: ${DB_NAME:-webapp}
      MYSQL_WAIT_HOST: mysql
      MYSQL_WAIT_PORT: "3306"
    depends_on:
      mysql:
        condition: service_healthy
    restart: unless-stopped

volumes:
  mysql_data:
